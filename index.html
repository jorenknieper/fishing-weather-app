<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fishing Weather – Aalter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Fishing Weather</h1>
    <p class="location">Aalter, Belgium</p>
    <button id="theme-toggle" onclick="toggleTheme()">Dark mode</button>
  </header>

  <main id="dashboard">
    <div id="error-message" class="error hidden">
      <p>Could not load weather data. Please try again later.</p>
    </div>

    <div id="weather-grid" class="grid hidden">
      <div class="card">
        <span class="label">Temperature</span>
        <span class="value" id="temperature">–</span>
        <span class="unit">°C</span>
      </div>
      <div class="card">
        <span class="label">Feels Like</span>
        <span class="value" id="apparent-temperature">–</span>
        <span class="unit">°C</span>
      </div>
      <div class="card">
        <span class="label">Humidity</span>
        <span class="value" id="humidity">–</span>
        <span class="unit">%</span>
      </div>
      <div class="card">
        <span class="label">Pressure (MSL)</span>
        <span class="value" id="pressure-msl">–</span>
        <span class="unit">hPa</span>
      </div>
      <div class="card">
        <span class="label">Pressure (Surface)</span>
        <span class="value" id="pressure-surface">–</span>
        <span class="unit">hPa</span>
      </div>
      <div class="card">
        <span class="label">Precipitation</span>
        <span class="value" id="precipitation">–</span>
        <span class="unit">mm</span>
      </div>
      <div class="card">
        <span class="label">Wind Speed</span>
        <span class="value" id="wind-speed">–</span>
        <span class="unit">km/h</span>
      </div>
      <div class="card">
        <span class="label">Wind Direction</span>
        <span class="value" id="wind-direction">–</span>
      </div>
    </div>
  </main>

  <footer>
    <p>Last updated: <span id="last-updated">–</span></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
