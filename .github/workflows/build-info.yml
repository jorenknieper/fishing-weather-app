name: Update build info

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

concurrency:
  group: build-info
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (!startsWith(github.event.head_commit.message, 'chore: update weather data') &&
           !startsWith(github.event.head_commit.message, 'chore: update build info')) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate build-info.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-build-info.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/build-info.json
          if git diff --cached --quiet; then
            echo "No build-info changes"
          else
            git commit -m "chore: update build info"
            git push
          fi
